version: 1
# Amplify Hosting build spec. The `backend` phase deploys the Amplify Gen 2
# backend (Cognito, AppSync, DynamoDB, the Gemini Lambda) and generates
# amplify_outputs.json; the `frontend` phase then builds the Vite app to dist/.
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npm run build
  artifacts:
    # Vite outputs to dist/ (NOT build/). Wrong value = blank page in prod.
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
